# .travis.yml

language: python
python:
  # Using the Python version specified in your setup
  - "3.11"

# Install dependencies in a virtualenv
install:
  - python3 -m venv venv
  - source venv/bin/activate
  - pip install --upgrade pip
  - pip install -r requirements.txt
  - pip install coverage coveralls

# Run tests with coverage
script:
  - source venv/bin/activate
  - black --check .
  - flake8 .
  # --- FIX: Removed --source flag. .coveragerc handles inclusion now.
  - coverage run manage.py test 
  - coverage report -m

# Send coverage to Coveralls
after_success:
  - source venv/bin/activate
  - coverage xml
  - coveralls --verbose --service-branch $TRAVIS_BRANCH

# Deploy to EC2
deploy:
  provider: script
  skip_cleanup: true
  script: bash deploy.sh
  on:
    all_branches: true
