language: python
python:
  - "3.11"

install:
  - pip install -r requirements.txt
  - pip install coverage coveralls

script:
  - coverage run manage.py test
  - coverage run --source='.' manage.py test

after_success:
  - coveralls

deploy:
  provider: script
  skip_cleanup: true
  script: |
    echo "$DEPLOY_KEY" | base64 -d > travis_deploy_key
    chmod 600 travis_deploy_key
    ssh -i travis_deploy_key -o StrictHostKeyChecking=no ubuntu@$EC2_HOST << 'EOF'
      cd ~/team2-wed-fall25-deploy
      git fetch origin LeBranch
      git reset --hard origin/LeBranch
      source venv/bin/activate
      python manage.py migrate
      python manage.py collectstatic --noinput
      sudo systemctl restart gunicorn
EOF
  on:
    branch: LeBranch
