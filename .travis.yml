language: python
python:
  - "3.11"

env:
  - CI=true

install:
  - python3 -m venv venv
  - source venv/bin/activate
  - pip install --upgrade pip
  - pip install -r requirements.txt
  - pip install coverage coveralls

script:
  - source venv/bin/activate
  - coverage run --source='.' manage.py test

after_success:
  - source venv/bin/activate
  - coveralls --verbose

deploy:
  provider: script
  skip_cleanup: true
  script: bash deploy.sh
  on:
    all_branches: true
