language: python
python:
  - "3.11"

# Create virtualenv
install:
  - python3 -m venv venv
  - source venv/bin/activate
  - pip install --upgrade pip
  - pip install -r requirements.txt
  - pip install coverage coveralls

# Run coverage tests
script:
  - source venv/bin/activate
  - coverage run --source='.' manage.py test

# Send coverage to Coveralls
after_success:
  - source venv/bin/activate
  - coveralls --verbose

# Deploy to EC2
deploy:
  provider: script
  skip_cleanup: true
  script: |
    echo "$DEPLOY_KEY" | base64 -d > travis_deploy_key
    chmod 600 travis_deploy_key
    ssh -i travis_deploy_key -o StrictHostKeyChecking=no ubuntu@$EC2_HOST << 'EOF'
      cd ~/team2-wed-fall25-deploy
      git fetch origin Sahil_feature_branch
      git reset --hard origin/Sahil_feature_branch
      source venv/bin/activate
      python manage.py migrate
      python manage.py collectstatic --noinput
      sudo systemctl restart gunicorn
EOF
  on:
    all_branches: true
