{% extends 'base.html' %}

{% block title %}Create Post - Forum - AcePrep{% endblock %}

{% block content %}
<div class="container" style="margin-top: 100px; padding: 40px 0;">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="mb-4">
                <a href="{% url 'forum' %}" class="text-decoration-none text-muted">
                    <i class="fas fa-arrow-left me-2"></i>Back to Forum
                </a>
            </div>
            
            <div class="card-modern p-4">
                <h2 class="fw-bold mb-4">
                    <i class="fas fa-edit me-2" style="color: var(--primary-color);"></i>
                    Create New Post
                </h2>
                
                {% if messages %}
                    {% for message in messages %}
                    <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>
                    {% endfor %}
                {% endif %}
                
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-4">
                        <label for="title" class="form-label fw-medium">Title</label>
                        <input type="text" class="form-control" id="title" name="title" 
                               placeholder="Enter post title" required>
                    </div>
                    
                    <div class="mb-4">
                        <label for="content" class="form-label fw-medium">Content</label>
                        <textarea class="form-control" id="content" name="content" rows="10" 
                                  placeholder="Share your thoughts, questions, or experiences..." required></textarea>
                    </div>
                    
                    <div class="d-flex gap-3">
                        <button type="submit" class="btn btn-modern btn-primary-modern">
                            <i class="fas fa-paper-plane me-2"></i>Publish Post
                        </button>
                        <a href="{% url 'forum' %}" class="btn btn-modern btn-outline-secondary">
                            Cancel
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
